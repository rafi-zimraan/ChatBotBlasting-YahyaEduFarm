<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Jabatangan</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .login-bg {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(0,20,10,0.75) 0%, rgba(0,0,0,0.5) 50%, rgba(0,30,15,0.8) 100%),
                url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1920&q=80') center/cover no-repeat;
            z-index: 0;
        }

        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(37,211,102,0.08) 0%, transparent 60%);
        }

        .login-page {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 24px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 2px solid rgba(255,255,255,0.12);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .login-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.55);
            margin-bottom: 32px;
            font-weight: 400;
        }

        .login-form {
            text-align: left;
        }

        .login-form .form-group {
            margin-bottom: 18px;
        }

        .login-form label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-form input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .login-form input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .login-form input:focus {
            border-color: rgba(37,211,102,0.5);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(37,211,102,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #25d366 0%, #1da851 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(37,211,102,0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            color: #f87171;
            font-size: 13px;
            margin-top: 14px;
            display: none;
            text-align: center;
        }

        .theme-toggle-login {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
        }

        .theme-toggle-login:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .login-footer {
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.5px;
        }

        /* decorative floating shapes */
        .login-deco {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .login-deco-1 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(37,211,102,0.06) 0%, transparent 70%);
            top: -100px; right: -100px;
        }

        .login-deco-2 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(37,211,102,0.04) 0%, transparent 70%);
            bottom: -50px; left: -50px;
        }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; border-radius: 20px; }
            .login-title { font-size: 20px; }
        }

        html[data-theme="light"] .login-card {
            background: rgba(255,255,255,0.12);
        }

        html[data-theme="light"] .login-title { color: #fff; }
        html[data-theme="light"] .login-form label { color: rgba(255,255,255,0.75); }
        html[data-theme="light"] .login-form input {
            background: rgba(255,255,255,0.10);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>
    <div class="login-deco login-deco-1"></div>
    <div class="login-deco login-deco-2"></div>

    <button class="theme-toggle-login" onclick="toggleTheme()" title="Ganti tema">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path class="icon-moon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            <circle class="icon-sun" cx="12" cy="12" r="5"/>
            <line class="icon-sun" x1="12" y1="1" x2="12" y2="3"/>
            <line class="icon-sun" x1="12" y1="21" x2="12" y2="23"/>
            <line class="icon-sun" x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line class="icon-sun" x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line class="icon-sun" x1="1" y1="12" x2="3" y2="12"/>
            <line class="icon-sun" x1="21" y1="12" x2="23" y2="12"/>
            <line class="icon-sun" x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line class="icon-sun" x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
    </button>

    <div class="login-page">
        <div class="login-card">
            <img src="/logo.jpg" alt="Yahya Edu Farm" class="login-logo">
            <div class="login-title">Jabatangan</div>
            <div class="login-sub">WhatsApp Blast Controller — YahyaEduFarm</div>
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" value="owner@gmail.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Masuk</button>
                <div class="login-error" id="loginError">Email atau password salah.</div>
            </form>
            <div class="login-footer">GriyaIT Nusantara &bull; YahyaEduFarm</div>
        </div>
    </div>

    <script>
        const savedTheme = localStorage.getItem('jabatangan-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('jabatangan-theme', next);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            btn.disabled = true;
            btn.textContent = 'Memproses...';
            err.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();
                if (data.ok) {
                    sessionStorage.setItem('jabatangan-token', data.token);
                    window.location.href = '/';
                } else {
                    err.textContent = data.error || 'Email atau password salah.';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.textContent = 'Gagal terhubung ke server.';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Masuk';
            }
        }
    </script>
</body>
</html>
